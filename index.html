<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para Poleth ✨</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }

        /* ── PANTALLA INICIO ── */
        #pantalla-inicio {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #0a0015 0%, #000000 100%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s ease-out;
        }

        #texto-carga {
            color: #00e5ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 0 0 20px #0088ff;
        }

        /* ── BOTÓN HUELLA DIGITAL  */
        #fingerprint-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #fp-label {
            color: #00e5ff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 4px;
            opacity: 0.9;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00e5ff;
        }

        #fp-btn {
            position: relative;
            width: 130px;
            height: 130px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Anillos tecnológicos rotatorios */
        #fp-ring-outer {
            position: absolute;
            top: -20px;
            left: -20px;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 229, 255, 0.6);
            animation: spin 15s linear infinite;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2), inset 0 0 15px rgba(0, 229, 255, 0.2);
        }

        #fp-ring-inner {
            position: absolute;
            top: -5px;
            left: -5px;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #0088ff;
            border-bottom-color: #00e5ff;
            animation: spin-reverse 8s linear infinite;
            opacity: 0.8;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        /* SVG huella centrado */
        #fp-btn svg {
            width: 85%;
            height: 85%;
            z-index: 2;
            filter: drop-shadow(0 0 8px #00e5ff);
        }

        /* overlay de scan */
        #fp-scan {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            pointer-events: none;
            z-index: 3;
        }

        #fp-scan-line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, #00e5ff, #ffffff, #00e5ff, transparent);
            box-shadow: 0 0 15px 5px rgba(0, 229, 255, 0.8);
            top: -4px;
            opacity: 0;
        }
        /* estado: escaneando */
        #fp-btn.scanning #fp-scan-line {
            opacity: 1;
            animation: scan-move 1.2s ease-in-out forwards;
        }

        @keyframes scan-move {
            0% {
                top: 0%;
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0.3;
            }
        }
        /* estado: éxito */
        #fp-btn.success #fp-ring-outer, #fp-btn.success #fp-ring-inner {
            border-color: #44ffaa;
            animation: none;
            opacity: 1;
            box-shadow: 0 0 20px #44ffaa;
        }

        #fp-btn.success .fp-path {
            stroke: #44ffaa !important;
            filter: drop-shadow(0 0 10px #44ffaa);
        }

        /* ── BIG BANG OVERLAY ── */
        #bigbang {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 998;
            pointer-events: none;
            display: none;
            background: radial-gradient(ellipse at center, #ffffff 0%, #ffeecc 15%, #aa44ff 40%, #000000 80%);
            opacity: 0;
        }

        /* ── MENSAJE FLOTANTE ── */
        #mensaje-flotante {
            position: absolute;
            bottom: 120px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1rem;
            pointer-events: none;
            opacity: 0;
            text-shadow: 0 0 10px #ff69b4;
            letter-spacing: 1px;
            transition: opacity 2s;
        }

        .animar-flotar {
            animation: flotar 3s ease-in-out infinite;
        }

        @keyframes flotar {
            0%,100% {
                transform: translateY(0);
                opacity: 0.8;
            }

            50% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        /* ── CONTROLES MÚSICA ── */
        #music-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            opacity: 0;
            transition: opacity 1.5s;
        }

        #song-title {
            color: #ffb3d9;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 0 0 8px #ff69b4;
            text-align: center;
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* Barra de progreso  psdt  si lees esto te quiero poleth */
        #progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ffb3d9;
        }

        #progress-bar {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 5px;
            border-radius: 5px;
            background: rgba(255,105,180,0.3);
            cursor: pointer;
            outline: none;
        }

            #progress-bar::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: #ff69b4;
                cursor: pointer;
                box-shadow: 0 0 8px #ff69b4;
            }

            #progress-bar::-moz-range-thumb {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                border: none;
                background: #ff69b4;
                cursor: pointer;
                box-shadow: 0 0 8px #ff69b4;
            }

        #music-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .mc-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,105,180,0.4);
            color: #fff;
            font-size: 1.3rem;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            backdrop-filter: blur(4px);
        }

            .mc-btn:hover {
                background: rgba(255,20,147,0.3);
            }

            .mc-btn:active {
                transform: scale(0.92);
            }

        #btn-play {
            width: 56px;
            height: 56px;
            font-size: 1.6rem;
            border-color: rgba(255,105,180,0.7);
        }
    </style>
</head>
<body>

    <div id="bigbang"></div>

    <div id="pantalla-inicio">
        <div id="texto-carga">Cargando el universo... 0%</div>

        <div id="fingerprint-wrap">
            <div id="fp-label">Análisis Biométrico</div>
            <div id="fp-btn">
                <div id="fp-ring-outer"></div>
                <div id="fp-ring-inner"></div>
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path class="fp-path" d="M50 15 C30 15 15 30 15 50" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 15 C70 15 85 30 85 50" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 22 C35 22 22 35 22 50 C22 65 28 75 35 82" stroke="#00d0ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 22 C65 22 78 35 78 50 C78 65 72 75 65 82" stroke="#00d0ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 29 C40 29 29 40 29 50 C29 62 33 72 40 78" stroke="#00bcff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 29 C60 29 71 40 71 50 C71 62 67 72 60 78" stroke="#00bcff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 36 C45 36 36 43 36 50 C36 58 39 65 44 70" stroke="#00a8ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 36 C55 36 64 43 64 50 C64 58 61 65 56 70" stroke="#00a8ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 43 C48 43 43 46 43 50 C43 54 45 59 48 63" stroke="#0094ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 43 C52 43 57 46 57 50 C57 54 55 59 52 63" stroke="#0094ff" stroke-width="2" stroke-linecap="round" />
                    <path class="fp-path" d="M50 50 C50 50 50 55 50 57" stroke="#0080ff" stroke-width="2" stroke-linecap="round" />

                <div id="fp-scan"><div id="fp-scan-line"></div></div>

        </div>
    </div>

    <div id="mensaje-flotante" class="animar-flotar">✨ explora tu universo ✨</div>

    <div id="music-bar">
        <div id="song-title">♪ Cargando música...</div>
        <div id="progress-container">
            <span id="time-current">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100">
            <span id="time-total">0:00</span>
        </div>
        <div id="music-controls">
            <button class="mc-btn" id="btn-prev">⏮</button>
            <button class="mc-btn" id="btn-play">▶</button>
            <button class="mc-btn" id="btn-next">⏭</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ── MÚSICA ────────────────────────────────────────────────────────────────
        const cancionesLista = [
            'musica/Ali Gatie - It\'s You.mp3',
            'musica/Ariana Grande - better off.mp3',
            'musica/Ariana Grande - goodnight n go.mp3',
            'musica/Ariana Grande - imagine.mp3',
            'musica/Ariana Grande - intro.mp3',
            'musica/Ariana Grande - pov.mp3',
            'musica/As The World Caves In - Matt Maltese.mp3',
            'musica/Bruno Mars - Just The Way You Are.mp3',
            'musica/Bruno Mars - Locked Out Of Heaven.mp3',
            'musica/Bruno Mars - Risk It All.mp3',
            'musica/Cody Fry - I Hear a Symphony.mp3',
            'musica/Damiano David - Mysterious Girl.mp3',
            'musica/Damiano David - Zombie Lady.mp3',
            'musica/DJ Snake, Justin Bieber - Let Me Love You.mp3',
            'musica/Ed Sheeran - Give Me Love.mp3',
            'musica/Happy Together.mp3',
            'musica/Harry Styles - Adore You.mp3',
            'musica/Harry Styles - Coming Up Roses.mp3',
            'musica/keshi - Soft Spot.mp3',
            'musica/Lana Del Rey - Say Yes To Heaven.mp3',
            'musica/Lana Del Rey - Video Games.mp3',
            'musica/LIFETIME.mp3',
            'musica/Love song.mp3',
            'musica/Maroon 5 - Sunday Morning.mp3',
            'musica/New West - Those Eyes.mp3',
            'musica/No Idea.mp3',
            'musica/Rex Orange County - THE SHADE.mp3',
            'musica/Sabrina Carpenter - Read your Mind.mp3',
            'musica/Shawn Mendes - There\'s Nothing Holdin\' Me Back.mp3',
            'musica/She\'s The One.mp3',
            'musica/Sweet Dreams, TN.mp3',
            'musica/The 1975 - Robbers.mp3',
            'musica/The Exit.mp3',
            'musica/The Great War.mp3',
            'musica/The Weeknd, Ariana Grande - Die For You.mp3',
            'musica/Willamette Stone - Heart Like Yours.mp3'
        ];

        // Mezclar el array para orden aleatorio
        let ordenAleatorio = Array.from({ length: cancionesLista.length }, (_, i) => i).sort(() => Math.random() - 0.5);
        let indiceActual = 0;
        let reproduciendo = false;

        const audio = new Audio();
        const btnPlay = document.getElementById('btn-play');
        const songTitle = document.getElementById('song-title');
        const progressBar = document.getElementById('progress-bar');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');

        function formatearTiempo(segundos) {
            if (isNaN(segundos)) return "0:00";
            const m = Math.floor(segundos / 60);
            const s = Math.floor(segundos % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function cargarCancion(paso, autoplay) {
            indiceActual = (indiceActual + paso + ordenAleatorio.length) % ordenAleatorio.length;
            const indiceReal = ordenAleatorio[indiceActual];
            const ruta = cancionesLista[indiceReal];
            audio.src = ruta;

            // Limpiar el nombre para que se vea bonito
            let nombreLimpio = ruta.replace('musica/', '').replace('.mp3', '');
            songTitle.textContent = '♪ ' + nombreLimpio;

            if (autoplay) {
                audio.play().catch(() => { });
                reproduciendo = true;
                btnPlay.textContent = '⏸';
            }
        }

        // Eventos de la barra de progreso
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                progressBar.value = (audio.currentTime / audio.duration) * 100;
                timeCurrent.textContent = formatearTiempo(audio.currentTime);
            }
        });
        audio.addEventListener('loadedmetadata', () => {
            timeTotal.textContent = formatearTiempo(audio.duration);
        });
        progressBar.addEventListener('input', () => {
            if (audio.duration) {
                audio.currentTime = (progressBar.value / 100) * audio.duration;
            }
        });

        audio.addEventListener('ended', () => cargarCancion(1, true));

        btnPlay.addEventListener('click', () => {
            if (reproduciendo) { audio.pause(); reproduciendo = false; btnPlay.textContent = '▶'; }
            else { audio.play().catch(() => { }); reproduciendo = true; btnPlay.textContent = '⏸'; }
        });
        document.getElementById('btn-next').addEventListener('click', () => cargarCancion(1, reproduciendo));
        document.getElementById('btn-prev').addEventListener('click', () => cargarCancion(-1, reproduciendo));

        // Cargar la primera canción
        cargarCancion(0, false);

        // ── ESCENA THREE.JS ───────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.FogExp2(0x000000, 0.00015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 8000);
        camera.position.set(0, 400, 1600);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 0.6;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;

        controls.autoRotateSpeed = 1.0;
        controls.minDistance = 50; controls.maxDistance = 4000;

        // ── GESTOR DE CARGA ───────────────────────────────────────────────────────
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const txtCarga = document.getElementById('texto-carga');
        const fpWrap = document.getElementById('fingerprint-wrap');
        const fpBtn = document.getElementById('fp-btn');
        const fpScanLine = document.getElementById('fp-scan-line');
        const bigbangEl = document.getElementById('bigbang');

        const loadingMgr = new THREE.LoadingManager(
            () => { txtCarga.style.display = 'none'; fpWrap.style.display = 'flex'; generarGatosEnEscena(); },
            (url, loaded, total) => { txtCarga.innerText = `Reuniendo estrellas y gatos... ${Math.round(loaded / total * 100)}%`; },
            // NUEVA FUNCIÓN DE ERROR:
            (url) => {
                console.error('Error al cargar:', url);
                txtCarga.innerText = 'Ups... faltan algunas estrellas (Error de carga)';
            }
        );

        // ── BOTÓN HUELLA ──────────────────────────────────────────────────────────
        fpBtn.addEventListener('click', () => {
            if (fpBtn.classList.contains('scanning') || fpBtn.classList.contains('success')) return;
            fpBtn.classList.add('scanning');
            fpScanLine.style.animation = 'none';
            void fpScanLine.offsetWidth;
            fpScanLine.style.animation = 'scan-move 1.2s ease-in-out forwards';

            setTimeout(() => {
                fpBtn.classList.remove('scanning');
                fpBtn.classList.add('success');
                // Pequeña vibración si disponible
                if (navigator.vibrate) navigator.vibrate([40, 30, 40]);

                // Esperar un momento y lanzar Big Bang
                setTimeout(() => { lanzarBigBang(); }, 400);
            }, 1300);
        });

        function lanzarBigBang() {
            cargarCancion(0, true);
            bigbangEl.style.display = 'block';

            // Fase 1: flash blanco explosivo
            bigbangEl.style.transition = 'opacity 0.15s ease-out';
            bigbangEl.style.opacity = '1';

            setTimeout(() => {
                // Fase 2: expandir y desvanecer
                bigbangEl.style.background = 'radial-gradient(ellipse at center, #ffffff 0%, #00e5ff 20%, #6600cc 50%, #000000 100%)';
                bigbangEl.style.transition = 'opacity 1.8s ease-in, transform 2s ease-out';
                bigbangEl.style.transform = 'scale(3)';
                bigbangEl.style.opacity = '0';

                // Ocultar pantalla inicio
                pantallaInicio.style.opacity = '0';
                setTimeout(() => { pantallaInicio.style.display = 'none'; bigbangEl.style.display = 'none'; bigbangEl.style.transform = 'scale(1)'; }, 1800);

            }, 200);

            document.getElementById('mensaje-flotante').style.opacity = '1';
            document.getElementById('music-bar').style.opacity = '1';

            // VELOCIDAD DE ROTACIÓN TRAS EL BIG BANG
            controls.autoRotateSpeed = 0.5;


            let t = 0;
            const startZ = camera.position.z;
            const targetZ = 800;
            const camAnim = setInterval(() => {
                t += 0.02;
                camera.position.z = startZ + (targetZ - startZ) * (1 - Math.exp(-t * 2));
                camera.position.y = 400 * (1 - t * 0.5);
                if (t >= 1.2) clearInterval(camAnim);
            }, 16);
        }

        const textureLoader = new THREE.TextureLoader(loadingMgr);

        // ── LUCES ─────────────────────────────────────────────────────────────────
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.PointLight(0xffaa00, 1.5, 5000);
        sunLight.position.set(0, 0, 0); scene.add(sunLight);

        // ── TEXTURA PLANETA ───────────────────────────────────────────────────────
        function crearTexturaPlaneta(c1, c2, tipo) {
            const s = 1024, c = document.createElement('canvas'); c.width = s; c.height = s;
            const x = c.getContext('2d'); x.fillStyle = c1; x.fillRect(0, 0, s, s);
            const n = tipo == 'gas' ? 500 : 1200;
            for (let i = 0; i < n; i++) {
                x.globalAlpha = 0.4; x.fillStyle = c2; x.beginPath();
                const p = Math.random() * s, q = Math.random() * s, r = Math.random() * (tipo == 'gas' ? 35 : 12);
                if (tipo == 'gas') x.ellipse(p, q, r * 3, r / 3, Math.random(), 0, 6); else x.arc(p, q, r, 0, 6); x.fill();
            }
            return new THREE.CanvasTexture(c);
        }

        // ── ESTRELLAS DE FONDO
        const starGeo = new THREE.BufferGeometry();
        const sPos = new Float32Array(100000 * 3);
        for (let i = 0; i < 100000 * 3; i += 3) {
            const r = 300 + Math.random() * 4000, t = Math.random() * Math.PI * 2, p = Math.acos(2 * Math.random() - 1);
            sPos[i] = r * Math.sin(p) * Math.cos(t); sPos[i + 1] = r * Math.sin(p) * Math.sin(t); sPos[i + 2] = r * Math.cos(p);
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.0, transparent: true, opacity: 0.8, sizeAttenuation: true, fog: false })));

        // ── SOL ───────────────────────────────────────────────────────────────────
        const sun = new THREE.Mesh(new THREE.SphereGeometry(50, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffcc44 }));
        const glowTex = new THREE.CanvasTexture((() => {
            const c = document.createElement('canvas'); c.width = 128; c.height = 128; const x = c.getContext('2d');
            const g = x.createRadialGradient(64, 64, 0, 64, 64, 64);
            g.addColorStop(0, 'rgba(255,180,60,1)'); g.addColorStop(0.4, 'rgba(255,100,20,0.2)'); g.addColorStop(1, 'rgba(0,0,0,0)');
            x.fillStyle = g; x.fillRect(0, 0, 128, 128); return c;
        })());
        const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xffaa55, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false }));
        sunGlow.scale.set(500, 500, 1); sun.add(sunGlow); scene.add(sun);

        // ── PLANETA POLETH ────────────────────────────────────────────────────────
        const centerGroup = new THREE.Group();
        centerGroup.position.set(100, 20, 100); scene.add(centerGroup);
        const pMat = new THREE.MeshStandardMaterial({ map: crearTexturaPlaneta('#ff99cc', '#ff66aa', 'craters'), roughness: 0.6, metalness: 0.1, emissive: 0x330011 });
        centerGroup.add(new THREE.Mesh(new THREE.SphereGeometry(30, 64, 64), pMat));
        const ring = new THREE.Mesh(new THREE.TorusGeometry(45, 1.5, 32, 100), new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.3, metalness: 0.6 }));
        ring.rotation.x = Math.PI / 2; centerGroup.add(ring);

        // ── CARTEL ────────────────────────────────────────────────────────────────
        const cv = document.createElement('canvas'); cv.width = 1400; cv.height = 900;
        const ctx = cv.getContext('2d'); ctx.clearRect(0, 0, cv.width, cv.height);
        ctx.textAlign = 'center';

                tailPos[s * 3] = -(s * tailLen / 12);
                tailPos[s * 3 + 1] = (Math.random() - 0.5) * 3;
                tailPos[s * 3 + 2] = (Math.random() - 0.5) * 3;
            }
            tailGeo.setAttribute('position', new THREE.BufferAttribute(tailPos, 3));
            const tailMat = new THREE.LineBasicMaterial({
                color: 0xff7722, transparent: true, opacity: 0.6,
                blending: THREE.AdditiveBlending, depthWrite: false, linewidth: 2
            });
            const tail = new THREE.Line(tailGeo, tailMat);

            const group = new THREE.Group();
            group.add(core);
            group.add(tail);
            group.position.set(sx, sy, sz);
            const dir = new THREE.Vector3(dx / dl, dy / dl, dz / dl);
            group.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), dir);
            scene.add(group);

            return { group, core, tail, dir, speed, life: 0, maxLife: 70 + Math.random() * 60 };
        }

        const meteoritos = [];
        let tMeteorito = 0;
        function actualizarMeteoritos(frame) {
            if (frame - tMeteorito > 120 + Math.random() * 80) {
                if (meteoritos.length < 8) meteoritos.push(crearMeteorito());
                tMeteorito = frame;
            }
            for (let i = meteoritos.length - 1; i >= 0; i--) {
                const m = meteoritos[i]; m.life++;
                const t = m.life / m.maxLife;
                m.group.position.addScaledVector(m.dir, m.speed);
                let alpha;
                if (t < 0.05) alpha = t / 0.05;
                else if (t < 0.8) alpha = 1.0;
                else alpha = 1.0 - (t - 0.8) / 0.2;
                alpha = Math.max(0, alpha);
                m.core.material.opacity = alpha * 0.95;
                m.tail.material.opacity = alpha * 0.55;
                if (m.life >= m.maxLife) {
                    scene.remove(m.group);
                    m.core.geometry.dispose();
                    m.core.material.dispose();
                    m.tail.geometry.dispose();
                    m.tail.material.dispose();
                    meteoritos.splice(i, 1);
                }
            }
        }

        // ── ESTRELLAS FUGACES ─────────────────────────────────────────────────────
        const fugaces = [];
        function crearEstrellaFugaz() {
            const radio = 600 + Math.random() * 800, theta = Math.random() * Math.PI * 2, phi = Math.acos(2 * Math.random() - 1) * 0.5;
            const sx = radio * Math.sin(phi) * Math.cos(theta), sy = 200 + Math.random() * 400, sz = radio * Math.sin(phi) * Math.sin(theta);
            const dx = (Math.random() - 0.5) * 2, dy = -0.5 - Math.random() * 0.5, dz = (Math.random() - 0.5) * 2;
            const dl = Math.sqrt(dx * dx + dy * dy + dz * dz), length = 60 + Math.random() * 100;
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([0, 0, 0, length, 0, 0]), 3));
            const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
            const line = new THREE.Line(geo, mat);
            line.position.set(sx, sy, sz);
            line.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), new THREE.Vector3(dx / dl, dy / dl, dz / dl));
            scene.add(line);
            return { mesh: line, dir: new THREE.Vector3(dx / dl, dy / dl, dz / dl), speed: 3 + Math.random() * 5, life: 0, maxLife: 60 + Math.random() * 40 };
        }
        let tUF = 0;
        function actualizarFugaces(frame) {
            if (frame - tUF > 80 + Math.sin(frame * 0.01) * 40) { if (fugaces.length < 12) fugaces.push(crearEstrellaFugaz()); tUF = frame; }
            for (let i = fugaces.length - 1; i >= 0; i--) {
                const f = fugaces[i]; f.life++; const t = f.life / f.maxLife;
                f.mesh.position.addScaledVector(f.dir, f.speed);
                const alpha = t < 0.15 ? t / 0.15 : t < 0.7 ? 1.0 : 1.0 - (t - 0.7) / 0.3;
                f.mesh.material.opacity = Math.max(0, alpha * 0.95);
                if (f.life >= f.maxLife) { scene.remove(f.mesh); f.mesh.geometry.dispose(); f.mesh.material.dispose(); fugaces.splice(i, 1); }
            }
        }

        // ── ANIMACIÓN ─────────────────────────────────────────────────────────────
        let frame = 0;
        function animate() {
            requestAnimationFrame(animate); frame++;
            controls.update();
            centerGroup.rotation.y += 0.003; sign.lookAt(camera.position);
            solarSystem.children.forEach(o => { o.rotation.y += o.userData.s; if (o.children[0]) o.children[0].rotation.y += 0.005; });
            scene.children.forEach(c => { if (c.isSprite && c.userData.sp) c.position.y = c.userData.y + Math.sin(Date.now() * 0.002) * 2; });
            milkyWay.rotation.y += 0.00005;
            dustParticles.rotation.y += 0.00008; dustParticles.rotation.x += 0.00003;
            actualizarMeteoritos(frame);
            actualizarFugaces(frame);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
